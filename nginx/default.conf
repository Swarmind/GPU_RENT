server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    # Detect proxy recursion (common when upstream DNS points back to this frontend).
    if ($http_x_frontend_proxy_hop = "1") {
      return 508;
    }

    proxy_pass https://api.anthive.ai/;
    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;

    proxy_set_header Host api.anthive.ai;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Frontend-Proxy-Hop 1;
  }

  location /auth/ {
    # Detect proxy recursion (common when upstream DNS points back to this frontend).
    if ($http_x_frontend_proxy_hop = "1") {
      return 508;
    }

    proxy_pass https://auth.swarmind.ai/;
    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;

    proxy_set_header Host auth.swarmind.ai;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Frontend-Proxy-Hop 1;

    # Force auth cookie to frontend host so browser treats it as first-party.
    proxy_cookie_domain ~(?i)(^|\.)swarmind\.ai$ $host;
    proxy_cookie_path / /;
  }
}
